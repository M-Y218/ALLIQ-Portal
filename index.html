<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ALLIQ Portal</title>

    <link rel="stylesheet" href="style-v1.css">

    <!-- ホーム画面アイコン設定 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#1565C0">

</head>

<body>

    <div class="background">
        <div class="light"></div>
        <div class="light light2"></div>
    </div>

    <main class="container">

        <div class="logoArea">

            <h1 class="logo">ALLIQ</h1>

            <div class="subtitle">
                Business Portal
            </div>

            <div class="shop">
                東向田店
            </div>

            <div class="logoLine"></div>

        </div>

        <div class="menu">

            <button id="shopSearch" class="menuButton">
                <span class="icon">🏪</span>
                <span class="title">店舗コード検索</span>
                <span class="arrow">›</span>
            </button>

            <button id="customerInfo" class="menuButton">
                <span class="icon">👥</span>
                <span class="title">得意先情報</span>
                <span class="arrow">›</span>
            </button>

            <button id="containerBtn" class="menuButton">
                <span class="icon">🍺</span>
                <span class="title">空容器</span>
                <span class="arrow">›</span>
            </button>

            <button id="recycleBtn" class="menuButton">
                <span class="icon">♻</span>
                <span class="title">月額雑瓶回収対象店</span>
                <span class="arrow">›</span>
            </button>

            <button id="campaign" class="menuButton">
                <span class="icon">🎯</span>
                <span class="title">キャンペーン</span>
                <span class="arrow">›</span>
            </button>

            <button id="manual" class="menuButton">
                <span class="icon">📖</span>
                <span class="title">マニュアル</span>
                <span class="arrow">›</span>
            </button>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
